<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Catalyst AI Talent Pipeline Architecture</title>
  <style>
    text { font-family: system-ui, sans-serif; fill: #1a1a2e; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; fill: #4a4a6a; }
    .arr { stroke: #6b6b90; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b6b90" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="220" y="20" width="240" height="50" rx="10" fill="#f0eff8" stroke="#c8c6e0" stroke-width="0.5"/>
  <text class="th" x="340" y="41" text-anchor="middle">Job Description (raw text)</text>
  <text class="ts" x="340" y="58" text-anchor="middle">Free-form JD paste</text>

  <line x1="340" y1="70" x2="340" y2="102" class="arr" marker-end="url(#arrow)"/>

  <!-- Stage 1 -->
  <rect x="160" y="102" width="360" height="66" rx="10" fill="#ede8fb" stroke="#a99de0" stroke-width="0.5"/>
  <text class="th" x="340" y="124" text-anchor="middle">Stage 1 — JD Parsing</text>
  <text class="ts" x="340" y="145" text-anchor="middle">Gemini extracts: skills, seniority, salary, location, responsibilities</text>
  <text class="ts" x="340" y="161" text-anchor="middle">→ Structured ParsedJD object</text>

  <line x1="340" y1="168" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <rect x="120" y="200" width="440" height="80" rx="10" fill="#e1f5ee" stroke="#5dcaa5" stroke-width="0.5"/>
  <text class="th" x="340" y="222" text-anchor="middle">Stage 2 — Candidate Matching</text>
  <text class="ts" x="340" y="242" text-anchor="middle">Batch-scores 15 candidates vs ParsedJD in one Gemini call</text>
  <text class="ts" x="340" y="258" text-anchor="middle">Match Score = 40% skills · 25% experience · 20% role · 15% education</text>
  <text class="ts" x="340" y="274" text-anchor="middle">→ Top 8 candidates with match reasons + missing skills</text>

  <line x1="340" y1="280" x2="340" y2="312" class="arr" marker-end="url(#arrow)"/>

  <!-- Stage 3 -->
  <rect x="80" y="312" width="520" height="80" rx="10" fill="#faece7" stroke="#f0997b" stroke-width="0.5"/>
  <text class="th" x="340" y="334" text-anchor="middle">Stage 3 — Outreach Simulation (top 6)</text>
  <text class="ts" x="340" y="354" text-anchor="middle">AI roleplays 6–8 message recruiter ↔ candidate conversation per profile</text>
  <text class="ts" x="340" y="370" text-anchor="middle">Interest Score = enthusiasm signals, red flags, response tone</text>
  <text class="ts" x="340" y="386" text-anchor="middle">→ Conversation thread + interest signals + red flags per candidate</text>

  <line x1="340" y1="392" x2="340" y2="424" class="arr" marker-end="url(#arrow)"/>

  <!-- Scoring -->
  <rect x="160" y="424" width="360" height="54" rx="10" fill="#faeeda" stroke="#ef9f27" stroke-width="0.5"/>
  <text class="th" x="340" y="445" text-anchor="middle">Scoring Engine</text>
  <text class="ts" x="340" y="463" text-anchor="middle">Combined = (Match × 0.55) + (Interest × 0.45)</text>
  <text class="ts" x="340" y="479" text-anchor="middle">Match weighted higher — skill fit trumps enthusiasm</text>

  <line x1="340" y1="478" x2="340" y2="510" class="arr" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="160" y="510" width="360" height="66" rx="10" fill="#eaf3de" stroke="#639922" stroke-width="0.5"/>
  <text class="th" x="340" y="532" text-anchor="middle">Ranked Shortlist Dashboard</text>
  <text class="ts" x="340" y="552" text-anchor="middle">Sorted by Combined Score · 3 tabs: Overview, Conversation, Analysis</text>
  <text class="ts" x="340" y="568" text-anchor="middle">Explainability: match reasons, red flags, score breakdown</text>
</svg>
